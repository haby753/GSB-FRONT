<div class="container mx-auto p-6 bg-white shadow-lg rounded-lg max-w-2xl">
  <h2 class="text-2xl font-semibold text-center mb-6">Ajouter une Fiche de Frais</h2>

  <form (ngSubmit)="addFiche()" #ficheForm="ngForm" class="space-y-4">

    <!-- Mois -->
    <div>
      <label for="mois" class="block text-sm font-medium">Mois :</label>
      <input
        type="month"
        id="mois"
        [(ngModel)]="newFiche.mois"
        name="mois"
        required
        class="w-full p-2 border rounded-md"
      />
    </div>

    <!-- Date -->
    <div>
      <label for="date" class="block text-sm font-medium">Date :</label>
      <input
        type="date"
        id="date"
        [(ngModel)]="newFiche.date"
        name="date"
        required
        class="w-full p-2 border rounded-md"
      />
    </div>

    <!-- Nombre de justificatifs -->
    <div>
      <label for="nbJustificatifs" class="block text-sm font-medium">Nombre de justificatifs :</label>
      <input
        type="number"
        id="nbJustificatifs"
        [(ngModel)]="newFiche.nbJustificatifs"
        name="nbJustificatifs"
        min="0"
        required
        class="w-full p-2 border rounded-md"
      />
    </div>

    <!-- Montant -->
    <div>
      <label for="montant" class="block text-sm font-medium">Montant (€) :</label>
      <input
        type="number"
        id="montant"
        [(ngModel)]="newFiche.montantvalide"
        name="montant"
        required
        min="0"
        step="0.01"
        class="w-full p-2 border rounded-md"
      />
    </div>




    <!-- Bouton de soumission -->
    <button
      type="submit"
      [disabled]="ficheForm.invalid"
      class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-md transition"
    >
      Ajouter la fiche de frais
    </button>

  </form>
</div>
