<div class="container">
  <h2>Modifier la fiche de frais</h2>


    <div class="form-group">
      <label for="mois">Mois:</label>
      <input type="text" id="mois" class="form-control" formControlName="mois" />
    </div>

    <div class="form-group">
      <label for="nbJustificatifs">Nombre de justificatifs:</label>
      <input type="number" id="nbJustificatifs" class="form-control" formControlName="nbJustificatifs" />
    </div>

    <div class="form-group">
      <label for="montant">Montant:</label>
      <input type="number" id="montant" class="form-control" formControlName="montant" />
    </div>

    <div class="form-group">
      <label for="date">Date:</label>
      <input type="date" id="date" class="form-control" formControlName="date" />
    </div>

    <div class="form-group">
      <label for="nom">Visiteur (Nom):</label>
      <input type="text" id="nom" class="form-control" formControlName="visiteur.nom" />
    </div>

    <div class="form-group">
      <label for="prenom">Visiteur (Prénom):</label>
      <input type="text" id="prenom" class="form-control" formControlName="visiteur.prenom" />
    </div>

    <div class="form-group">
      <label for="etat">État:</label>
      <input type="text" id="etat" class="form-control" formControlName="etat.libelle" />
    </div>

    <button type="submit" class="btn btn-primary">Mettre à jour</button>
    <button type="button" class="btn btn-secondary" (click)="router.navigate(['/fichesfrais'])">Annuler</button>

</div>
